<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de frases aleatórias</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>💭 Gerador de frases aleatórias</h1>
        <div class="quote-box">
            <p id="quote">Clique no botão para gerar uma frase</p>
        </div>
        <button onclick="gerarFrase()" id="btn-gerar">🎲 Gerar Frase</button>
        <button onclick="resetarFrases()" id="btn-resetar">🔄 Resetar</button>
        <p id="contador">Frases restantes: 10</p>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
